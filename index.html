
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DOOH Full Creative</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

.banner {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
}

.banner img { width: 100%; height: 100%; }

.overlay {
  position: absolute;
  top: 67%;
  left: 13%;
  transform: translate(-50%, -50%);
  text-align: center;
  font-family: Arial, Helvetica, sans-serif;
  color: #000;
}

.launching {
    font-size: 3vw;
    letter-spacing: 1px;
    font-weight: bold;
}
.date {
    font-size: 2.8vw;
    font-weight: bold;
    margin-top: 2px;
}
.timer {
    font-size: 3.8vw;
    font-weight: bold;
    margin-top: 8px;
    letter-spacing: 4px;
}
.launched  { color: red; font-size: 4.5vw; font-weight: bold; }
.background-video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  top: 0;
  left: 0;
  z-index: -1;  
  pointer-events: none; /* prevents interaction */
}
</style>
</head>

<body>
<div class="banner">
  <img src="images/2880x960.webp" alt="h&m">
<!-- <video class="background-video" autoplay muted loop playsinline>
  <source src="images/3456x384.webm" type="video/webm">
</video> -->

  <div class="overlay" id="overlay">
    <div id="launchText" class="launching">LAUNCHING</div>
    <div id="dateText"   class="date">07.05.26</div>
    <div class="timer">
      <span id="d">00</span>:<span id="h">00</span>:<span id="m">00</span>:<span id="s" style="color:red;">00</span>
    </div>
  </div>
</div>

<script>
// =============================
// CONFIG
// =============================
const TARGET_MS = new Date("2026-05-07T00:00:00+05:30").getTime();

// =============================
// DOM
// =============================
const overlay = document.getElementById("overlay");
const elD = document.getElementById("d");
const elH = document.getElementById("h");
const elM = document.getElementById("m");
const elS = document.getElementById("s");

// =============================
// GLOBALS
// =============================
let timeOffset = 0;
let launched = false;

// =============================
// 🔥 SYNC WITH SERVER TIME
// =============================
async function syncTime() {
  try {
    const res = await fetch(
      "https://api.timezonedb.com/v2.1/get-time-zone?key=NDDBQYIWQP7Q&format=json&by=zone&zone=Asia/Kolkata"
    );

    const data = await res.json();

    // TimeZoneDB gives formatted datetime
    const serverTime = new Date(data.formatted).getTime();
    const localTime = Date.now();

    timeOffset = serverTime - localTime;

    console.log("✅ Time synced (TimeZoneDB):", timeOffset, "ms");
  } catch (err) {
    console.warn("⚠️ Sync failed, using local time");
    timeOffset = 0;
  }
}

// =============================
// 🔥 RENDER
// =============================
let lastValidDiff = null;
function render() {
  if (launched) return;

  const now = Date.now() + timeOffset;
  let diff = TARGET_MS - now;

  // 🔥 FIX: prevent false negative jump
  if (diff <= 0) {
    if (lastValidDiff !== null && lastValidDiff > 1000) {
      // ignore glitch (temporary sync issue)
      diff = lastValidDiff;
    } else {
      launched = true;
      overlay.innerHTML = '<div class="launched">LAUNCHED</div>';
      return;
    }
  }

  lastValidDiff = diff;
  const totalSec = Math.floor(diff / 1000);

  const d = Math.floor(totalSec / 86400);
  const h = Math.floor((totalSec % 86400) / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;

  elD.textContent = String(d).padStart(2, "0");
  elH.textContent = String(h).padStart(2, "0");
  elM.textContent = String(m).padStart(2, "0");
  elS.textContent = String(s).padStart(2, "0");
}

// =============================
// 🔥 SCHEDULER (NO DRIFT)
// =============================
function scheduleNext() {
  if (launched) return;

  const now = Date.now() + timeOffset;

  render();

  const ms = 1000 - (now % 1000);
  setTimeout(scheduleNext, ms);
}

// =============================
// 🔥 START
// =============================
async function startCountdown() {
  await syncTime();           // first sync
  scheduleNext();             // start timer

  setInterval(syncTime, 5 * 60 * 1000); // resync every 5 min
}

startCountdown();
</script>
</body>
</html>
